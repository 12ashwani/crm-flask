<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Lead</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <h3>Edit Lead</h3>
    <form method="post" action="{{ url_for('marketing.edit_lead', lead_id=lead.id) }}">
      <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" name="company_name" class="form-control" value="{{ lead.company_name }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Service</label>
        <input type="text" name="service" class="form-control" value="{{ lead.service }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contact Person</label>
        <input type="text" name="auth_person_name" class="form-control" value="{{ lead.auth_person_name }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Contact Phone</label>
        <input type="text" name="auth_person_number" class="form-control" value="{{ lead.auth_person_number }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Contact Email</label>
        <input type="email" name="auth_person_email" class="form-control" value="{{ lead.auth_person_email }}">
      </div>
      <button class="btn btn-primary" type="submit">Save Changes</button>
      <a class="btn btn-secondary" href="{{ url_for('marketing.marketing_leads') }}">Cancel</a>
    </form>
  </div>
</body>
</html>
